name: DeathPunish
main: com.deathPunish.DeathPunish
version: ${project.version}
api-version: 1.13
folia-supported: true
softdepend: [Vault, WorldGuard, Residence]

commands:
  deathpunish:
    description: 死亡惩罚
    usage: /deathpunish <help|give|set|add|get|migrate|reload>
    aliases:
      - dp

permissions:
  deathpunish.command:
    description: deathpunish command permission
    default: op
  deathpunish.bypass:
    description: deathpunish bypass permission
    default: false
  deathpunish.craft:
    description: 允许制作回血物品
    default: true
  deathpunish.protect:
    description: 允许使用死亡保护物品
    default: true
